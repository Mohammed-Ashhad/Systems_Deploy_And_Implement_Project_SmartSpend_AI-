name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: python -m pytest tests -v

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            usa1555/smartspend-ai:latest
            usa1555/smartspend-ai:${{ github.sha }}

      - name: Smoke test
        run: |
          docker build -t smartspend-test .
          docker run -d -p 5000:5000 --name smartspend-test-container smartspend-test
          sleep 10
          curl http://localhost:5000/health | grep ok
          docker stop smartspend-test-container
          docker rm smartspend-test-container

      - name: Push to Docker Hub
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            usa1555/smartspend-ai:latest
            usa1555/smartspend-ai:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-test-push
    if: github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_URL }}
