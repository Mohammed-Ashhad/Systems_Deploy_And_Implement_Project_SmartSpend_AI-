{% extends "base.html" %}
{% block content %}
<h1>Dashboard</h1>
<div class="summary-container">
    <div class="summary-card income"><h3>Total Income</h3><p>{{ summary.income }}</p></div>
    <div class="summary-card expense"><h3>Total Expenses</h3><p>{{ summary.expenses }}</p></div>
    <div class="summary-card balance"><h3>Balance</h3><p>{{ summary.balance }}</p></div>
</div>
<h2>Transactions</h2>
<table>
    <thead><tr><th>Type</th><th>Amount</th><th>Category</th></tr></thead>
    <tbody>
        {% for t in transactions %}
        <tr><td>{{ t.type }}</td><td>{{ t.amount }}</td><td>{{ t.category }}</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
